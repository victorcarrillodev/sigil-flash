
[General]
# Privacy: "device" — no exponer el nombre del host en el advertising
Privacy = device
# FastConnectable: acelera la fase de conexión pagando algo más de batería
FastConnectable = true
# ReconnectAttempts y ReconnectIntervals fueron eliminados:
# BlueZ en Raspberry Pi OS Bookworm NO los reconoce y lanza warnings que
# pueden confundir los logs. La reconexión automática la maneja bt-connect.sh.

[Policy]
# AutoEnable: encender el adaptador automáticamente al arrancar
AutoEnable = true
# ReconnectAttempts es una directiva válida en [Policy], no en [General]
# en las versiones recientes de BlueZ (>=5.65)
ReconnectAttempts = 7