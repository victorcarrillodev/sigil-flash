# =============================================================================
# audio.conf — Configuración del sistema de audio Sigil
# =============================================================================
# Copiar a: /etc/sigil/audio.conf
# Permisos: 600 root:root

# --- Servidor ---
SERVER_URL="https://sigil-server.tail942ea3.ts.net"

# --- Authentication ---
# query: x-api-key header via protected curl config (never URL/argv).
# Firstboot consumes /etc/sigil/secrets/enrollment-key and stores the returned
# permanent token only in /etc/sigil/secrets/device-api-key.
AUTH_MODE="query"

# --- Comportamiento ---
# radio-first: mantiene RADIO como modo primario
# local-first: usa LOCAL como modo primario
PLAYBACK_MODE="radio-first"

# Intentos fallidos antes de hacer fallback a LOCAL
FALLBACK_THRESHOLD=3

# Intervalo de check al servidor (segundos)
SERVER_CHECK_INTERVAL=30

# Intervalo de sync de playlist (segundos)
PLAYLIST_SYNC_INTERVAL=300

# --- Cache Policy (7 DÍAS) ---
CACHE_TTL_DAYS=7
CACHE_AUTO_RENEW=true
CACHE_DELETE_ON_EXPIRE=true
CACHE_PRESERVE_WHEN_OFFLINE=false

# --- Phase 2C: Transition policy ---
# AUTO_RETURN_TO_RADIO: when true, audio-manager automatically transitions
# from LOCAL back to RADIO once internet has been stable for the recovery
# interval. Set to false to stay in LOCAL until explicitly switched.
AUTO_RETURN_TO_RADIO=true

# Recovery interval (minutes): how long internet must remain available
# before attempting RADIO recovery. Prevents flip-flopping on flaky links.
RECOVERY_INTERVAL_MINUTES=30

# --- Phase 2C compatibility ---
# TEMP_FALLBACK_ENABLED: must be false when audio-manager is operational.
# audio-manager owns all mode decisions. The player obeys audio_mode.json.
TEMP_FALLBACK_ENABLED=false

# --- Timeouts ---
# API health check (audio-manager)
HEALTHCHECK_TIMEOUT_SECONDS=10
# CONNECT_TIMEOUT_SECONDS applies to all curl connections
CONNECT_TIMEOUT_SECONDS=10
# Playlist fetch (radio-fetcher API call)
PLAYLIST_FETCH_TIMEOUT_SECONDS=15
# Single track download (radio-fetcher)
DOWNLOAD_TIMEOUT_SECONDS=300
# Radio stream playback (audio-player, one track)
STREAM_PLAYBACK_TIMEOUT_SECONDS=300

# Audio-output detection backoff. A sink name alone is not considered usable.
AUDIO_OUTPUT_RETRY_INITIAL_SECONDS=2
AUDIO_OUTPUT_RETRY_MAX_SECONDS=30
# Explicit hardware capability. Only the strict value 1 makes I2S eligible;
# absent, invalid, or 0 means the device has no declared PCM5102A output.
SIGIL_I2S_DAC_PRESENT=0
# ALSA/PulseAudio enumeration and a successful silent frame write prove only
# software readiness. They cannot prove that a PCM5102A, amplifier, or speaker
# is physically connected.
# Retry on download failure
DOWNLOAD_RETRY_COUNT=2
DOWNLOAD_RETRY_DELAY_SECONDS=5

# --- Geolocation (WiFi) ---
# SIGIL_GEOLOCATION_ENABLED=true
# SIGIL_GEOLOCATION_COOLDOWN_SECONDS=3600
# SIGIL_GEOLOCATION_MIN_APS=2
# SIGIL_GEOLOCATION_MAX_APS=30
# SIGIL_GEOLOCATION_TIMEOUT_SECONDS=10

# --- Logging ---
LOG_LEVEL="INFO"
