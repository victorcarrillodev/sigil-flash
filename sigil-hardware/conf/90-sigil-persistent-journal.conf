[Journal]
# Preserve enough cross-boot evidence for field failures without allowing
# unbounded microSD growth.  This filename sorts after Raspberry Pi OS's
# 40-rpi-volatile-storage.conf, so Storage=persistent is the effective value.
Storage=persistent
Compress=yes
SystemMaxUse=64M
SystemKeepFree=128M
SystemMaxFileSize=8M
MaxRetentionSec=14day
MaxFileSec=1day
RuntimeMaxUse=16M
