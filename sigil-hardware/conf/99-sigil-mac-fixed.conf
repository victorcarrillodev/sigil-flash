# /etc/NetworkManager/conf.d/99-sigil-mac-fixed.conf
# Desactiva la randomización de MAC en WiFi para que la Pi siempre
# se identifique con su MAC de hardware real ante routers y el servidor.
# Esto es necesario en Sigil porque el servidor usa la MAC como device_id.
# Esta política NO cambia la propiedad de wlan0: AP/cliente se controla
# dinámicamente mediante wifi-fallback.sh.

[device]
wifi.scan-rand-mac-address=no

[connection]
wifi.cloned-mac-address=permanent
ethernet.cloned-mac-address=permanent
